<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>New vs Remediated Report – Prisma Cloud</title>
<link rel="stylesheet" href="design-system.css">
<link rel="stylesheet" href="style.css">
<style>
.diff-toolbar { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; margin-bottom: var(--space-4); }
.scan-select { padding: var(--space-2) var(--space-3); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: var(--text-sm); outline: none; min-width: 220px; }
.scan-select:focus { border-color: var(--sky); }
.diff-arrow { color: var(--muted); font-size: 18px; font-weight: 700; }
.btn-compare { padding: var(--space-2) var(--space-4); background: var(--sky); color: #fff; border: none; border-radius: var(--radius); font-weight: 700; font-size: var(--text-sm); cursor: pointer; transition: background var(--t-base); }
.btn-compare:hover { background: var(--sky-dark); }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: var(--space-3); margin-bottom: var(--space-5); }
.kpi-card { padding: var(--space-4); border-radius: var(--radius-lg); background: var(--surface); border: 1px solid var(--border); text-align: center; }
.kpi-value { font-size: var(--text-2xl); font-weight: 800; font-family: var(--font-mono); }
.kpi-label { font-size: var(--text-xs); color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
.kpi-up { color: var(--red); }
.kpi-down { color: var(--green); }
.kpi-neutral { color: var(--muted); }

.diff-section { margin-bottom: var(--space-5); }
.diff-section-head { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-3); }
.diff-section-title { font-size: var(--text-lg); font-weight: 800; }
.diff-count-badge { padding: 2px 8px; border-radius: 12px; font-size: var(--text-xs); font-weight: 700; }
.badge-new { background: rgba(239,68,68,.15); color: var(--red); }
.badge-resolved { background: rgba(34,197,94,.15); color: var(--green); }
.badge-changed { background: rgba(14,165,233,.15); color: var(--sky); }

table.diff-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
.diff-table th { text-align: left; padding: var(--space-2) var(--space-3); font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 2px solid var(--border); background: var(--surface-2); }
.diff-table td { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-soft); color: var(--text-2); vertical-align: top; }
.diff-table tr:hover td { background: var(--surface); }
.mono { font-family: var(--font-mono); }
.pkg-list { list-style: none; padding: 0; margin: 0; }
.pkg-list li { font-size: 11px; padding: 1px 0; }
.pkg-name { font-family: var(--font-mono); font-weight: 600; font-size: 11px; }
.change-old { text-decoration: line-through; color: var(--muted); margin-right: 6px; }
.change-new { font-weight: 700; }
.empty-msg { text-align: center; padding: var(--space-5); color: var(--muted); font-style: italic; }

.export-wrap { position: relative; }
.btn-export { padding: var(--space-2) var(--space-4); background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-weight: 600; font-size: var(--text-sm); cursor: pointer; }
.btn-export:hover { border-color: var(--sky); }
.export-menu { position: absolute; top: 100%; right: 0; margin-top: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); min-width: 140px; z-index: 100; display: none; }
.export-menu.open { display: block; }
.export-menu button { display: block; width: 100%; padding: var(--space-2) var(--space-3); background: none; border: none; color: var(--text); text-align: left; font-size: var(--text-sm); cursor: pointer; }
.export-menu button:hover { background: var(--surface-2); }
</style>
</head>
<body>
<nav class="s-nav">
  <a href="/" class="nav-brand"><div class="nav-logo">☁</div><span class="nav-name">Prisma Cloud</span></a>
  <a href="/" class="nav-link">Dashboard</a>

  <a href="/explorer.html" class="nav-link">Explorer</a>
  <a href="/schedules.html" class="nav-link">Schedules</a>
  <a href="/settings.html" class="nav-link">Settings</a>
  <div class="nav-spacer"></div>
  <span id="theme-slot"></span>
  <div id="tenant-slot"></div>
</nav>

<div class="s-main">
  <div class="page-header">
    <h1 class="page-title">New vs Remediated Report</h1>
    <p class="page-subtitle">Compare two scans to see new, resolved, and modified vulnerabilities</p>
  </div>

  <div class="diff-toolbar">
    <label style="font-size:var(--text-sm);color:var(--text-2)">Base Scan</label>
    <select id="scan-a" class="scan-select"></select>
    <span class="diff-arrow">→</span>
    <label style="font-size:var(--text-sm);color:var(--text-2)">Compare Scan</label>
    <select id="scan-b" class="scan-select"></select>
    <button class="btn-compare" onclick="runDiff()">Compare</button>
    <div style="flex:1"></div>
    <div class="export-wrap">
      <button class="btn-export" onclick="toggleExportMenu()">Export ▾</button>
      <div id="export-menu" class="export-menu">
        <button onclick="doExport('pdf')">PDF</button>
        <button onclick="doExport('html')">HTML</button>
        <button onclick="doExport('csv')">CSV</button>
      </div>
    </div>
  </div>

  <div id="kpi-row" class="kpi-row" style="display:none"></div>

  <div id="diff-content" style="display:none">
    <div class="diff-section">
      <div class="diff-section-head">
        <span class="diff-section-title">New Vulnerabilities</span>
        <span id="new-badge" class="diff-count-badge badge-new"></span>
      </div>
      <div id="new-table-wrap"></div>
    </div>
    <div class="diff-section">
      <div class="diff-section-head">
        <span class="diff-section-title">Resolved Vulnerabilities</span>
        <span id="resolved-badge" class="diff-count-badge badge-resolved"></span>
      </div>
      <div id="resolved-table-wrap"></div>
    </div>
    <div class="diff-section">
      <div class="diff-section-head">
        <span class="diff-section-title">Changed Vulnerabilities</span>
        <span id="changed-badge" class="diff-count-badge badge-changed"></span>
      </div>
      <div id="changed-table-wrap"></div>
    </div>
  </div>

  <div id="empty-state" class="empty-msg">Select two scans and click Compare to see what changed.</div>
</div>

<script src="tenant.js"></script>
<script src="diff.js"></script>
</body>
</html>
